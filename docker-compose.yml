# ZK-Rollup Payment Relayer — Docker Compose Orchestration
#
# Runs the full end-to-end pipeline in a deterministic sequence.
# Usage:  docker-compose up --build --abort-on-container-exit verify
#
# Services run in this order:
#   hardhat → deployer → setup → relay → verify
#
# All services share the project volume so files written by one service
# (e.g. deployments/addresses.json) are immediately readable by the next.



# ─────────────────────────────────────────────────────────────────────────────
# Shared environment — public Hardhat test account keys.
# These accounts are pre-funded with 10,000 ETH in every Hardhat node.
# It is safe to commit these well-known keys; they have no value on mainnet.
# ─────────────────────────────────────────────────────────────────────────────
x-env: &common-env
  RPC_URL: http://hardhat:8545
  # Account #0 — Deployer
  DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
  # Account #1 — Relayer
  RELAYER_PRIVATE_KEY:  "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
  RELAYER_ADDRESS:      "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
  # Account #2 — User A
  USER_A_PRIVATE_KEY:   "0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a"
  # Account #3 — User B
  USER_B_PRIVATE_KEY:   "0x7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6"

# ─────────────────────────────────────────────────────────────────────────────
# Shared volume — mounts the project root at /app inside every container.
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  project_data:

services:

  # ── 1. Hardhat node ─────────────────────────────────────────────────────────
  hardhat:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      <<: *common-env
    # Install deps then start the node.
    # --hostname 0.0.0.0 makes it reachable from other Docker services.
    command: >
      sh -c "npm install --silent &&
             npx hardhat node --hostname 0.0.0.0"
    ports:
      - "8545:8545"
    healthcheck:
      # Poll the JSON-RPC endpoint until the node responds to eth_chainId
      test:
        - CMD-SHELL
        - |
          node -e "
            const http = require('http');
            const req = http.request(
              { hostname: 'localhost', port: 8545, method: 'POST',
                headers: { 'Content-Type': 'application/json' } },
              res => process.exit(res.statusCode === 200 ? 0 : 1)
            );
            req.on('error', () => process.exit(1));
            req.end(JSON.stringify({
              jsonrpc:'2.0', id:1, method:'eth_chainId', params:[]
            }));
          "
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── 2. Compile & Deploy ──────────────────────────────────────────────────────
  deployer:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      hardhat:
        condition: service_healthy
    # Compile first (produces artifacts/), then run deploy script
    command: >
      sh -c "npm install --silent &&
             npx hardhat compile &&
             node scripts/deploy.js"

  # ── 3. Fund user accounts ────────────────────────────────────────────────────
  setup:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      deployer:
        condition: service_completed_successfully
    command: >
      sh -c "npm install --silent && node scripts/setup.js"

  # ── 4. Batch & commit intents ────────────────────────────────────────────────
  relay:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      setup:
        condition: service_completed_successfully
    command: >
      sh -c "npm install --silent && node scripts/relay.js"

  # ── 5. Verify on-chain state ─────────────────────────────────────────────────
  verify:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      <<: *common-env
    depends_on:
      relay:
        condition: service_completed_successfully
    command: >
      sh -c "npm install --silent && node scripts/verify.js"
